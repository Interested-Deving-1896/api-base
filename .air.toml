root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  include_ext = ["go", "sql"]
  exclude_dir = ["tmp", "bin", "test", "api/docs", "scripts"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000
  stop_on_error = true
  kill_delay = "500ms"
  send_interrupt = true

[log]
  time = true

[misc]
  clean_on_exit = true
